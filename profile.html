<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile | VoicePay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bank-color:#00D084;--bank-glow:rgba(0,208,132,0.4);--bank-color-rgb:0,208,132;--bg:#0A0A0F;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text-muted:#8A8A9E}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1200px 700px at 50% -15%,var(--bank-glow),transparent 60%),var(--bg);color:white;font-family:'Space Grotesk',sans-serif;min-height:100vh;padding-bottom:100px}
.top-bar{display:flex;align-items:center;gap:16px;padding:24px 16px 0}
.back-btn{background:var(--card);border:1px solid var(--border);width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;color:white;transition:all 0.2s}
.back-btn:hover{border-color:var(--bank-color);transform:scale(1.05)}
h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--text-muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{padding:24px 16px;max-width:600px;margin:0 auto}
.profile-header{background:linear-gradient(135deg,rgba(var(--bank-color-rgb),0.15),rgba(var(--bank-color-rgb),0.05));border:1px solid var(--bank-color);border-radius:24px;padding:32px 24px;text-align:center;position:relative;overflow:hidden;margin-bottom:24px}
.profile-header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,var(--bank-glow),transparent 70%);animation:rotate 8s linear infinite}
@keyframes rotate{100%{transform:rotate(360deg)}}
.avatar-wrapper{position:relative;z-index:2;display:inline-block}
.avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--bank-color),#00A866);display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:800;margin:0 auto 16px;border:4px solid var(--bg);overflow:hidden;box-shadow:0 10px 40px var(--bank-glow)}
.avatar img{width:100%;height:100%;object-fit:cover}
.edit-photo{position:absolute;bottom:16px;right:calc(50% - 60px);background:var(--bank-color);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:3px solid var(--bg);z-index:3}
.user-name{font-size:24px;font-weight:800;margin-bottom:6px;position:relative;z-index:2}
.user-email{font-size:14px;color:var(--text-muted);position:relative;z-index:2}
.verified-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(var(--bank-color-rgb),0.2);color:var(--bank-color);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:12px;position:relative;z-index:2}
.section{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px}
.section-title{font-size:14px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:14px;color:var(--text-muted)}
.info-value{font-size:15px;font-weight:600}
.menu-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s}
.menu-item:hover{border-color:var(--bank-color);transform:translateX(6px);background:rgba(var(--bank-color-rgb),0.05)}
.menu-icon{width:44px;height:44px;border-radius:12px;background:rgba(var(--bank-color-rgb),0.15);display:flex;align-items:center;justify-content:center;font-size:22px}
.menu-text{flex:1;font-weight:600;font-size:15px}
.menu-arrow{font-size:20px;color:var(--text-muted)}
.logout-btn{width:100%;padding:17px;border:none;border-radius:14px;background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);color:#ff3b30;font-weight:700;font-size:16px;cursor:pointer;margin-top:24px;transition:all 0.2s}
.logout-btn:hover{background:rgba(255,59,48,0.2)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal.show{display:flex}
.modal-card{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:400px}
.modal h3{color:var(--bank-color);margin-bottom:20px;font-size:20px}
.input-group{margin-bottom:16px}
.input-group label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase}
.input-group input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:white;font-size:15px;font-family:'Space Grotesk',sans-serif}
.input-group input:focus{outline:none;border-color:var(--bank-color)}
.btn{width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--bank-color),#00A866);color:#000;font-weight:800;font-size:16px;cursor:pointer;margin-top:12px}
.btn:disabled{opacity:0.5}
.btn.secondary{background:var(--card);color:white;border:1px solid var(--border)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--bank-color);color:#000;padding:14px 24px;border-radius:12px;font-weight:700;opacity:0;transition:opacity 0.3s;z-index:2000}
.toast.show{opacity:1}
.loading{text-align:center;color:var(--text-muted);padding:40px}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>Profile</h1>
</div>

<div class="container">
  <div id="loadingDiv" class="loading">Loading profile...</div>

  <div id="profileContent" style="display:none">
    <div class="profile-header">
      <div class="avatar-wrapper">
        <div class="avatar" id="userAvatar">JD</div>
        <div class="edit-photo" onclick="uploadPhoto()">📷</div>
        <input type="file" id="photoFile" accept="image/*" style="display:none">
      </div>
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-email" id="userEmail">Loading...</div>
      <div class="verified-badge">✓ Voice Verified</div>
    </div>

    <div class="section">
      <div class="section-title">Personal Information</div>
      <div class="info-row">
        <span class="info-label">Full Name</span>
        <span class="info-value" id="infoName">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Phone</span>
        <span class="info-value" id="infoPhone">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value" id="infoEmail">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Account Created</span>
        <span class="info-value" id="infoCreated">-</span>
      </div>
    </div>

    <div class="section-title" style="margin-left:4px;margin-bottom:12px">Account Settings</div>

    <div class="menu-item" onclick="openEditModal()">
      <div class="menu-icon">✏️</div>
      <div class="menu-text">Edit Profile</div>
      <div class="menu-arrow">→</div>
    </div>

    <div class="menu-item" onclick="location.href='./cards.html'">
      <div class="menu-icon">💳</div>
      <div class="menu-text">My Cards</div>
      <div class="menu-arrow">→</div>
    </div>

    <div class="menu-item" onclick="location.href='./beneficiaries.html'">
      <div class="menu-icon">👥</div>
      <div class="menu-text">Beneficiaries</div>
      <div class="menu-arrow">→</div>
    </div>

    <div class="menu-item" onclick="location.href='./emergency.html'">
      <div class="menu-icon">🚨</div>
      <div class="menu-text">Emergency Contacts</div>
      <div class="menu-arrow">→</div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-card">
    <h3>Edit Profile</h3>
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="editName" placeholder="John Doe">
    </div>
    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="editPhone" placeholder="08012345678" maxlength="11">
    </div>
    <button class="btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
    <button class="btn secondary" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast">Profile updated!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyCe6Gx4tJZ2AIhUWviYFgWhOxnbPoFSd3A",authDomain:"voicepay-harps-tech.firebaseapp.com",projectId:"voicepay-harps-tech",storageBucket:"voicepay-harps-tech.firebasestorage.app",messagingSenderId:"955301626221",appId:"1:955301626221:web:745d7a643b7c0bbbeb9a64"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const CLOUDINARY_CLOUD_NAME = 'dwc2sthsd';
const CLOUDINARY_UPLOAD_PRESET = 'voicepay_unsigned';

let currentUser = null;
let userData = null;
let photoFile = null;

function speakFemale(text){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-NG';u.pitch=1.4;u.rate=0.9;const voices=speechSynthesis.getVoices();const f=voices.find(v=>v.name.includes('Female')||v.name.includes('Karen'));if(f)u.voice=f;speechSynthesis.speak(u)}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

onAuthStateChanged(auth, async (user) => {
  if(!user){window.location.href='./login.html';return}
  currentUser = user;
  await loadProfile();
});

async function loadProfile(){
  try{
    const docRef = doc(db, 'users', currentUser.uid);
    const docSnap = await getDoc(docRef);
    if(docSnap.exists()){
      userData = docSnap.data();
      displayProfile(userData);
    }else{
      // Create doc if doesn't exist
      userData = {name: currentUser.displayName || '', email: currentUser.email, phone: ''};
      await setDoc(docRef, {...userData, createdAt: serverTimestamp()});
      displayProfile(userData);
    }
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('profileContent').style.display = 'block';
  }catch(e){
    console.error(e);
    speakFemale('Error loading profile');
  }
}

function displayProfile(data){
  const name = data.name || currentUser.displayName || 'User';
  const email = data.email || currentUser.email;
  const phone = data.phone || 'Not set';
  const photoUrl = data.photoUrl;
  const created = data.createdAt?.toDate ? new Date(data.createdAt.toDate()).toLocaleDateString() : 'Today';

  const avatar = document.getElementById('userAvatar');
  if(photoUrl){
    avatar.innerHTML = `<img src="${photoUrl}">`;
  }else{
    avatar.innerText = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  }

  document.getElementById('userName').innerText = name;
  document.getElementById('userEmail').innerText = email;
  document.getElementById('infoName').innerText = name;
  document.getElementById('infoPhone').innerText = phone;
  document.getElementById('infoEmail').innerText = email;
  document.getElementById('infoCreated').innerText = created;
}

window.uploadPhoto = function(){document.getElementById('photoFile').click()}

document.getElementById('photoFile').addEventListener('change', async function(e){
  photoFile = e.target.files[0];
  if(!photoFile) return;

  showToast('Uploading photo...');
  speakFemale('Uploading photo');

  try{
    const formData = new FormData();
    formData.append('file', photoFile);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    formData.append('folder', `voicepay/profile/${currentUser.uid}`);
    formData.append('resource_type', 'image');

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    // FIX: Use setDoc with merge instead of updateDoc
    await setDoc(doc(db, 'users', currentUser.uid), {
      photoUrl: data.secure_url,
      updatedAt: serverTimestamp()
    }, {merge: true});

    document.getElementById('userAvatar').innerHTML = `<img src="${data.secure_url}">`;
    showToast('Photo updated!');
    speakFemale('Profile photo updated');
  }catch(e){
    console.error(e);
    showToast('Upload failed');
  }
});

window.openEditModal = function(){
  document.getElementById('editName').value = userData.name || '';
  document.getElementById('editPhone').value = userData.phone || '';
  document.getElementById('editModal').classList.add('show');
  speakFemale('Edit profile form opened');
}

window.closeModal = function(){
  document.getElementById('editModal').classList.remove('show');
}

window.saveProfile = async function(){
  const saveBtn = document.getElementById('saveBtn');
  const name = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value;

  if(!name){
    showToast('Enter your name');
    return;
  }

  saveBtn.disabled = true;
  saveBtn.innerText = 'Saving...';

  try{
    // FIX: Use setDoc with merge
    await setDoc(doc(db, 'users', currentUser.uid), {
      name: name,
      phone: phone,
      updatedAt: serverTimestamp()
    }, {merge: true});

    await updateProfile(currentUser, {displayName: name});

    userData.name = name;
    userData.phone = phone;
    displayProfile(userData);

    showToast('Profile updated!');
    speakFemale('Profile updated successfully');
    closeModal();
    saveBtn.disabled = false;
    saveBtn.innerText = 'Save Changes';
  }catch(e){
    console.error(e);
    showToast('Error updating profile');
    saveBtn.disabled = false;
    saveBtn.innerText = 'Save Changes';
  }
}

window.logout = async function(){
  if(!confirm('Logout from VoicePay?')) return;
  await signOut(auth);
  speakFemale('Logged out successfully');
  window.location.href = './login.html';
}
</script>
</body>
</html>
