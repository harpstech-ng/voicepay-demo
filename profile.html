<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Enrollment | VoicePay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bank-color:#00D084;--bg:#0A0A0F;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text-muted:#8A8A9E}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:white;font-family:'Space Grotesk',sans-serif;padding:24px 16px;min-height:100vh;text-align:center}
.top-bar{display:flex;align-items:center;gap:16px;margin-bottom:32px;text-align:left}
.back-btn{background:var(--card);border:1px solid var(--border);width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;color:white}
h2{font-size:28px;font-weight:800}
.mic-circle{width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,var(--bank-color),#00A866);margin:60px auto;display:flex;align-items:center;justify-content:center;font-size:80px;cursor:pointer;box-shadow:0 0 120px rgba(0,208,132,0.4);transition:all 0.3s}
.mic-circle.recording{background:linear-gradient(135deg,#ff3b30,#d62828);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.status{font-size:16px;color:var(--text-muted);margin:20px 0}
.progress-bar{width:100%;max-width:300px;height:6px;background:var(--card);border-radius:999px;margin:20px auto;overflow:hidden}
.progress-fill{height:100%;background:var(--bank-color);width:0%;transition:width 0.3s}
.btn{width:100%;max-width:300px;padding:16px;border:none;border-radius:14px;background:var(--card);color:white;border:1px solid var(--border);font-weight:800;font-size:16px;cursor:pointer;margin-top:12px}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Voice Enrollment</h2>
</div>

<p class="status" id="statusText">Tap microphone and say: "My voice is my password"</p>

<div class="mic-circle" id="micBtn" onclick="toggleRecording()">🎤</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<p class="status" id="progressText">Sample 0 of 3 recorded</p>

<button class="btn" onclick="finishEnrollment()" id="finishBtn" style="display:none">Complete Enrollment</button>

<script>
let mediaRecorder;
let audioChunks = [];
let sampleCount = 0;
let isRecording = false;

window.toggleRecording = async function(){
  if(!isRecording){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = saveSample;
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('statusText').innerText = 'Recording... Speak clearly';
  } else {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  }
}

function saveSample(){
  sampleCount++;
  document.getElementById('progressFill').style.width = (sampleCount/3)*100 + '%';
  document.getElementById('progressText').innerText = `Sample ${sampleCount} of 3 recorded`;
  document.getElementById('statusText').innerText = sampleCount < 3 ? 'Tap again for next sample' : 'All samples recorded!';
  if(sampleCount >= 3) document.getElementById('finishBtn').style.display = 'block';
  speechSynthesis.speak(new SpeechSynthesisUtterance('Sample recorded'));
}

window.finishEnrollment = function(){
  alert('Voice enrollment complete! Your voice is now your security key.');
  speechSynthesis.speak(new SpeechSynthesisUtterance('Voice enrollment complete'));
  history.back();
}
</script>
</body>
</html>
