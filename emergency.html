<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Emergency Contacts | VoicePay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bank-color:#00D084;--bank-glow:rgba(0,208,132,0.4);--bank-color-rgb:0,208,132;--danger:#ff3b30;--bg:#0A0A0F;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--text-muted:#8A8A9E}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1200px 700px at 50% -15%,var(--bank-glow),transparent 60%),var(--bg);color:white;font-family:'Space Grotesk',sans-serif;padding:24px 16px;min-height:100vh}
.top-bar{display:flex;align-items:center;gap:16px;margin-bottom:32px}
.back-btn{background:var(--card);border:1px solid var(--border);width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;color:white}
h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--text-muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.info-banner{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);padding:16px;border-radius:14px;margin-bottom:24px;font-size:13px;color:#ff8a80;line-height:1.5}
.contact-item{background:var(--card);border:1px solid var(--border);padding:16px;border-radius:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;transition:all 0.2s}
.contact-item:hover{border-color:var(--bank-color)}
.avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--bank-color),#00A866);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.contact-info{flex:1}
.contact-name{font-weight:700;font-size:16px;margin-bottom:4px}
.contact-details{font-size:12px;color:var(--text-muted)}
.priority-badge{font-size:10px;padding:4px 8px;border-radius:6px;background:rgba(var(--bank-color-rgb),0.2);color:var(--bank-color);font-weight:700;margin-top:6px;display:inline-block}
.priority-1{background:rgba(255,59,48,0.2);color:#ff3b30}
.call-btn{background:var(--bank-color);border:none;color:#000;width:44px;height:44px;border-radius:12px;cursor:pointer;font-size:20px;flex-shrink:0}
.delete-btn{background:rgba(255,59,48,0.2);border:none;color:var(--danger);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px}
.add-btn{width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--bank-color),#00A866);color:#000;font-weight:800;font-size:16px;cursor:pointer;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 10px 30px var(--bank-glow)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal.show{display:flex}
.modal-card{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:400px}
.modal h3{color:var(--bank-color);margin-bottom:20px;font-size:20px}
.input-group{margin-bottom:16px}
.input-group label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase}
.input-group input,.input-group select{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:white;font-size:15px;font-family:'Space Grotesk',sans-serif}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--bank-color)}
.upload-area{border:2px dashed var(--border);border-radius:50%;width:80px;height:80px;margin:0 auto 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden}
.upload-area:hover{border-color:var(--bank-color)}
.upload-area img{width:100%;height:100%;object-fit:cover}
.btn{width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--bank-color),#00A866);color:#000;font-weight:800;font-size:16px;cursor:pointer;margin-top:12px}
.btn:disabled{opacity:0.5}
.btn.secondary{background:var(--card);color:white;border:1px solid var(--border)}
.loading{text-align:center;color:var(--text-muted);padding:40px}
.empty{text-align:center;color:var(--text-muted);padding:60px 20px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--bank-color);color:#000;padding:14px 24px;border-radius:12px;font-weight:700;opacity:0;transition:opacity 0.3s;z-index:2000}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Emergency Contacts</h2>
</div>

<div class="info-banner">
  ⚠️ These contacts will be called instantly if you trigger emergency mode during voice authentication. Add trusted people only.
</div>

<div id="loadingDiv" class="loading">Loading contacts...</div>
<div id="contactsList"></div>

<button class="add-btn" onclick="openModal()">
  <span>+</span>
  <span>Add Emergency Contact</span>
</button>

<!-- Add Contact Modal -->
<div class="modal" id="contactModal">
  <div class="modal-card">
    <h3>Add Emergency Contact</h3>

    <div class="upload-area" onclick="uploadPhoto()">
      <div id="photoPreview">📷</div>
      <input type="file" id="photoFile" accept="image/*" style="display:none">
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:16px">Photo Optional</p>

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="contactName" placeholder="Jane Doe">
    </div>
    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="phoneNumber" placeholder="08012345678" maxlength="11">
    </div>
    <div class="input-group">
      <label>Relationship</label>
      <select id="relationship">
        <option value="">Select Relationship</option>
        <option value="Spouse">Spouse</option>
        <option value="Parent">Parent</option>
        <option value="Sibling">Sibling</option>
        <option value="Child">Child</option>
        <option value="Friend">Friend</option>
        <option value="Guardian">Guardian</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="input-group">
      <label>Priority Level</label>
      <select id="priority">
        <option value="1">Priority 1 - Call First</option>
        <option value="2">Priority 2</option>
        <option value="3">Priority 3</option>
      </select>
    </div>

    <button class="btn" id="saveBtn" onclick="saveContact()">Save Contact</button>
    <button class="btn secondary" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast">Contact saved!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyCe6Gx4tJZ2AIhUWviYFgWhOxnbPoFSd3A",authDomain:"voicepay-harps-tech.firebaseapp.com",projectId:"voicepay-harps-tech",storageBucket:"voicepay-harps-tech.firebasestorage.app",messagingSenderId:"955301626221",appId:"1:955301626221:web:745d7a643b7c0bbbeb9a64"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// YOUR CLOUDINARY DETAILS
const CLOUDINARY_CLOUD_NAME = 'dwc2sthsd';
const CLOUDINARY_UPLOAD_PRESET = 'voicepay_unsigned';

let currentUser = null;
let photoFile = null;

function speakFemale(text){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-NG';u.pitch=1.4;u.rate=0.9;const voices=speechSynthesis.getVoices();const f=voices.find(v=>v.name.includes('Female')||v.name.includes('Karen'));if(f)u.voice=f;speechSynthesis.speak(u)}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

onAuthStateChanged(auth, async (user) => {
  if(!user){window.location.href='./login.html';return}
  currentUser = user;
  await loadContacts();
});

async function loadContacts(){
  const list = document.getElementById('contactsList');
  try{
    const q = query(collection(db, 'emergency_contacts'), where('userId', '==', currentUser.uid), orderBy('priority', 'asc'));
    const snap = await getDocs(q);

    if(snap.empty){
      list.innerHTML = '<div class="empty">No emergency contacts yet<br>Add trusted contacts below</div>';
      document.getElementById('loadingDiv').style.display = 'none';
      return;
    }

    list.innerHTML = '';
    snap.forEach(docSnap => {
      const contact = docSnap.data();
      const initials = contact.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      const avatar = contact.photoUrl?
        `<img src="${contact.photoUrl}">` :
        initials;

      const priorityClass = contact.priority === 1? 'priority-1' : '';

      list.innerHTML += `
        <div class="contact-item">
          <div class="avatar">${avatar}</div>
          <div class="contact-info">
            <div class="contact-name">${contact.name}</div>
            <div class="contact-details">${contact.phoneNumber} • ${contact.relationship}</div>
            <span class="priority-badge ${priorityClass}">Priority ${contact.priority}</span>
          </div>
          <button class="call-btn" onclick="callContact('${contact.phoneNumber}')">📞</button>
          <button class="delete-btn" onclick="deleteContact('${docSnap.id}')">×</button>
        </div>
      `;
    });
    document.getElementById('loadingDiv').style.display = 'none';
  }catch(e){
    console.error(e);
    list.innerHTML = '<div class="empty">Error loading contacts</div>';
  }
}

window.openModal = function(){
  document.getElementById('contactModal').classList.add('show');
  speakFemale('Add emergency contact form opened');
}

window.closeModal = function(){
  document.getElementById('contactModal').classList.remove('show');
  document.getElementById('contactName').value = '';
  document.getElementById('phoneNumber').value = '';
  document.getElementById('relationship').value = '';
  document.getElementById('priority').value = '1';
  document.getElementById('photoPreview').innerHTML = '📷';
  photoFile = null;
}

window.uploadPhoto = function(){document.getElementById('photoFile').click()}

document.getElementById('photoFile').addEventListener('change', function(e){
  photoFile = e.target.files[0];
  if(photoFile){
    const reader = new FileReader();
    reader.onload = e => document.getElementById('photoPreview').innerHTML = `<img src="${e.target.result}">`;
    reader.readAsDataURL(photoFile);
  }
});

// Format phone number
document.getElementById('phoneNumber').addEventListener('input', function(e){
  e.target.value = e.target.value.replace(/\D/g, '');
});

async function uploadToCloudinary(file){
  if(!file) return null;
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  formData.append('folder', `voicepay/emergency/${currentUser.uid}`);
  formData.append('resource_type', 'image');

  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
    method: 'POST',
    body: formData
  });
  const data = await res.json();
  return data.secure_url;
}

window.saveContact = async function(){
  const saveBtn = document.getElementById('saveBtn');
  const name = document.getElementById('contactName').value.trim();
  const phoneNumber = document.getElementById('phoneNumber').value;
  const relationship = document.getElementById('relationship').value;
  const priority = parseInt(document.getElementById('priority').value);

  if(!name){
    showToast('Enter full name');
    speakFemale('Enter full name');
    return;
  }
  if(phoneNumber.length < 11){
    showToast('Enter valid phone number');
    speakFemale('Enter valid phone number');
    return;
  }
  if(!relationship){
    showToast('Select relationship');
    return;
  }

  saveBtn.disabled = true;
  saveBtn.innerText = 'Uploading photo...';

  try{
    const photoUrl = await uploadToCloudinary(photoFile);

    saveBtn.innerText = 'Saving contact...';

    await addDoc(collection(db, 'emergency_contacts'), {
      userId: currentUser.uid,
      name: name,
      phoneNumber: phoneNumber,
      relationship: relationship,
      priority: priority,
      photoUrl: photoUrl,
      createdAt: serverTimestamp()
    });

    showToast('Emergency contact saved!');
    speakFemale('Emergency contact saved');
    closeModal();
    await loadContacts();
    saveBtn.disabled = false;
    saveBtn.innerText = 'Save Contact';

  }catch(e){
    console.error('Error saving:', e);
    showToast('Error saving contact');
    speakFemale('Error saving contact');
    saveBtn.disabled = false;
    saveBtn.innerText = 'Save Contact';
  }
}

window.deleteContact = async function(contactId){
  if(!confirm('Delete this emergency contact?')) return;
  try{
    await deleteDoc(doc(db, 'emergency_contacts', contactId));
    showToast('Contact deleted');
    speakFemale('Contact deleted');
    await loadContacts();
  }catch(e){
    showToast('Error deleting');
  }
}

window.callContact = function(phoneNumber){
  speakFemale('Calling emergency contact');
  window.location.href = `tel:${phoneNumber}`;
}
</script>
</body>
</html>
